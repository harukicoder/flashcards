<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨卡 · Ink Cards — Chinese Flashcards</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        chinese: ['"Noto Serif SC"', 'serif'],
        body: ['"DM Sans"', 'sans-serif'],
        display: ['"Crimson Pro"', 'serif'],
      },
      colors: {
        ink: {
          50: '#faf9f7',
          100: '#f3f1ec',
          200: '#e8e4db',
          300: '#d4cec1',
          400: '#b5ac99',
          500: '#968b74',
          600: '#7a6f5a',
          700: '#5e5444',
          800: '#3d3630',
          900: '#1f1b17',
        },
        vermillion: {
          DEFAULT: '#c4463a',
          light: '#e06b5f',
          dark: '#9e342a',
        },
        jade: {
          DEFAULT: '#4a8c6f',
          light: '#6aad8e',
          dark: '#377058',
        }
      }
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background-color: #faf9f7;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(196, 70, 58, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(74, 140, 111, 0.04) 0%, transparent 50%);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .perspective-container { perspective: 1000px; }

  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }

  .flashcard.flipped .flashcard-inner {
    transform: rotateY(180deg);
  }

  .flashcard-front, .flashcard-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 1rem;
  }

  .flashcard-back {
    transform: rotateY(180deg);
  }

  .flashcard {
    cursor: pointer;
    transition: filter 0.3s ease;
  }
  .flashcard:hover {
    filter: drop-shadow(0 8px 24px rgba(31, 27, 23, 0.1));
  }

  .flashcard .delete-btn {
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .flashcard:hover .delete-btn {
    opacity: 1;
  }

  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(24px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card-enter {
    animation: cardEnter 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .brush-underline {
    position: relative;
    display: inline-block;
  }
  .brush-underline::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: -4%;
    width: 108%;
    height: 8px;
    background: rgba(196, 70, 58, 0.18);
    border-radius: 4px;
    transform: rotate(-0.5deg);
  }

  input:focus {
    outline: none;
    border-color: #c4463a !important;
    box-shadow: 0 0 0 3px rgba(196, 70, 58, 0.1);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeInUp 0.6s ease forwards; }

  .seal-stamp {
    width: 36px;
    height: 36px;
    border: 2px solid rgba(196, 70, 58, 0.5);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(-8deg);
    color: rgba(196, 70, 58, 0.6);
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    font-weight: 700;
  }

  @keyframes gentlePulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  .gentle-pulse { animation: gentlePulse 3s ease-in-out infinite; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 100;
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .counter-badge {
    background: linear-gradient(135deg, #c4463a, #9e342a);
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(196, 70, 58, 0.2);
    border-top-color: #c4463a;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
    flex-shrink: 0;
  }

  .field-auto-filled {
    background-color: rgba(74, 140, 111, 0.06) !important;
    border-color: rgba(74, 140, 111, 0.3) !important;
  }

  .result-option {
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .result-option:hover {
    background-color: rgba(196, 70, 58, 0.06);
    border-color: #c4463a;
  }
  .result-option.selected {
    background-color: rgba(74, 140, 111, 0.08);
    border-color: #4a8c6f;
  }
</style>

<body class="relative z-10">

<!-- Toast -->
<div id="toast" class="toast">
  <div class="bg-ink-800 text-ink-100 px-5 py-3 rounded-xl text-sm font-medium shadow-lg flex items-center gap-2">
    <span id="toast-icon"></span>
    <span id="toast-text"></span>
  </div>
</div>

<!-- Main Container -->
<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">

  <!-- Header -->
  <header class="text-center mb-10 sm:mb-14 fade-in">
    <div class="flex items-center justify-center gap-3 mb-3">
      <span class="font-chinese text-3xl sm:text-4xl text-ink-800 tracking-wide">墨卡</span>
      <span class="text-ink-300 text-2xl font-thin">|</span>
      <span class="font-display text-2xl sm:text-3xl text-ink-600 italic tracking-tight">Ink Cards</span>
    </div>
    <p class="text-ink-400 font-body text-sm sm:text-base max-w-md mx-auto leading-relaxed">
      Type a character and let the app find the rest. <br class="hidden sm:block">
      <span class="brush-underline">Click a card to reveal its meaning.</span>
    </p>
  </header>

  <!-- Add Card Form -->
  <section class="mb-10 sm:mb-14 fade-in" style="animation-delay: 0.1s;">
    <div class="bg-white/70 backdrop-blur-sm border border-ink-200/60 rounded-2xl p-5 sm:p-7 shadow-sm max-w-2xl mx-auto">
      <div class="flex items-center gap-2 mb-5">
        <div class="w-1.5 h-1.5 rounded-full bg-vermillion"></div>
        <h2 class="font-display text-lg text-ink-700">Add a new card</h2>
      </div>

      <div id="add-card-form" class="space-y-4">
        <!-- Step 1: Character Input + Lookup -->
        <div>
          <label for="input-chinese" class="block text-xs font-medium text-ink-500 mb-1.5 tracking-wide uppercase">Chinese Character or Word</label>
          <div class="flex gap-2">
            <input
              type="text"
              id="input-chinese"
              placeholder="Type a character, e.g. 猫"
              class="flex-1 px-4 py-2.5 bg-ink-50 border border-ink-200 rounded-xl text-ink-800 font-chinese text-xl text-center placeholder:text-ink-300 placeholder:text-base placeholder:font-body transition-all duration-200"
            >
            <button
              id="lookup-btn"
              class="flex items-center gap-2 bg-vermillion hover:bg-vermillion-dark text-white px-5 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 hover:shadow-md active:scale-[0.97] whitespace-nowrap"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              Look up
            </button>
          </div>
        </div>

        <!-- Lookup Status -->
        <div id="lookup-status" class="hidden"></div>

        <!-- Multiple results selector -->
        <div id="results-selector" class="hidden space-y-2">
          <label class="block text-xs font-medium text-ink-500 tracking-wide uppercase">Multiple definitions found — pick one</label>
          <div id="results-list" class="space-y-2 max-h-52 overflow-y-auto pr-1"></div>
        </div>

        <!-- Step 2: Pinyin & English (auto-filled or manual) -->
        <div id="fields-row" class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 hidden">
          <div>
            <label for="input-pinyin" class="block text-xs font-medium text-ink-500 mb-1.5 tracking-wide uppercase">
              Pinyin
              <span class="text-ink-300 normal-case font-normal">· editable</span>
            </label>
            <input
              type="text"
              id="input-pinyin"
              placeholder="māo"
              class="w-full px-4 py-2.5 bg-ink-50 border border-ink-200 rounded-xl text-ink-700 text-center placeholder:text-ink-300 transition-all duration-200"
            >
          </div>
          <div>
            <label for="input-english" class="block text-xs font-medium text-ink-500 mb-1.5 tracking-wide uppercase">
              English
              <span class="text-ink-300 normal-case font-normal">· editable</span>
            </label>
            <input
              type="text"
              id="input-english"
              placeholder="cat"
              class="w-full px-4 py-2.5 bg-ink-50 border border-ink-200 rounded-xl text-ink-700 text-center placeholder:text-ink-300 transition-all duration-200"
            >
          </div>
        </div>

        <!-- Add button -->
        <div id="add-btn-row" class="hidden flex justify-between items-center pt-1">
          <button
            id="manual-toggle"
            class="text-ink-400 hover:text-ink-600 text-xs underline underline-offset-2 transition-colors"
          >
            Fill manually instead
          </button>
          <button
            id="add-btn"
            class="group flex items-center gap-2 bg-ink-800 hover:bg-ink-900 text-ink-100 px-6 py-2.5 rounded-xl text-sm font-medium transition-all duration-200 hover:shadow-md active:scale-[0.97]"
          >
            <svg class="w-4 h-4 transition-transform duration-200 group-hover:rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Add Card
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Cards Section Header -->
  <div class="flex items-center justify-between mb-6 fade-in" style="animation-delay: 0.2s;">
    <div class="flex items-center gap-3">
      <h2 class="font-display text-xl text-ink-700">Your Cards</h2>
      <span id="card-count" class="counter-badge text-white text-xs font-semibold px-2.5 py-0.5 rounded-full min-w-[28px] text-center hidden">0</span>
    </div>
    <button
      id="shuffle-btn"
      class="hidden text-ink-400 hover:text-ink-600 text-sm font-medium flex items-center gap-1.5 transition-colors duration-200"
      title="Shuffle cards"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Shuffle
    </button>
  </div>

  <!-- Cards Grid -->
  <div id="cards-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>

  <!-- Empty State -->
  <div id="empty-state" class="hidden text-center py-16 sm:py-24">
    <div class="gentle-pulse mb-5">
      <span class="font-chinese text-6xl text-ink-200">字</span>
    </div>
    <p class="text-ink-400 font-display text-lg italic mb-1">No cards yet</p>
    <p class="text-ink-300 text-sm">Type a Chinese character above and hit Look up.</p>
  </div>

</div>

<script>
(function() {
  // ─── State ───
  const STORAGE_KEY = 'inkCards_flashcards';

  function loadCards() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function saveCards(c) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(c));
  }

  let cards = loadCards();

  // ─── DOM refs ───
  const inputChinese  = document.getElementById('input-chinese');
  const inputPinyin   = document.getElementById('input-pinyin');
  const inputEnglish  = document.getElementById('input-english');
  const lookupBtn     = document.getElementById('lookup-btn');
  const lookupStatus  = document.getElementById('lookup-status');
  const resultsSelector = document.getElementById('results-selector');
  const resultsList   = document.getElementById('results-list');
  const fieldsRow     = document.getElementById('fields-row');
  const addBtnRow     = document.getElementById('add-btn-row');
  const addBtn        = document.getElementById('add-btn');
  const manualToggle  = document.getElementById('manual-toggle');
  const grid          = document.getElementById('cards-grid');
  const emptyState    = document.getElementById('empty-state');
  const cardCount     = document.getElementById('card-count');
  const shuffleBtn    = document.getElementById('shuffle-btn');
  const toastEl       = document.getElementById('toast');
  const toastIcon     = document.getElementById('toast-icon');
  const toastText     = document.getElementById('toast-text');

  // ─── Dictionary Lookup ───
  // Uses multiple free APIs in a fallback chain.
  // 1. CC-CEDICT via cccedict.org
  // 2. Wiktionary REST API

  async function lookupCharacter(query) {
    query = query.trim();
    if (!query) return null;

    // Try CC-CEDICT first
    try {
      const r = await lookupViaProxy(query);
      if (r && r.length > 0) return r;
    } catch (e) {
      console.log('Primary lookup failed:', e.message);
    }

    // Fallback: Wiktionary
    try {
      const r = await lookupWiktionary(query);
      if (r && r.length > 0) return r;
    } catch (e) {
      console.log('Wiktionary lookup failed:', e.message);
    }

    return null;
  }

  // ── CC-CEDICT via a CORS-friendly proxy ──
  async function lookupViaProxy(query) {
    // Use multiple endpoints for resilience
    const endpoints = [
      `https://api.ctext.org/getcharacter?char=${encodeURIComponent(query)}`,
    ];

    // Primary: parse from the open CC-CEDICT data via ctext API
    for (const url of endpoints) {
      try {
        const resp = await fetch(url, { signal: AbortSignal.timeout(4000) });
        if (!resp.ok) continue;
        const data = await resp.json();
        if (data && data.readings) {
          const results = [];
          // ctext returns mandarin readings
          const mandarin = data.readings?.mandarin || [];
          const english = data.meanings?.english || data.gloss || [];
          if (mandarin.length > 0 || english.length > 0) {
            results.push({
              chinese: query,
              pinyin: Array.isArray(mandarin) ? mandarin.join(', ') : String(mandarin),
              english: Array.isArray(english) ? english.join('; ') : String(english),
            });
          }
          if (results.length > 0) return results;
        }
      } catch { continue; }
    }

    return null;
  }

  // ── Wiktionary REST API ──
  async function lookupWiktionary(query) {
    const url = `https://en.wiktionary.org/api/rest_v1/page/definition/${encodeURIComponent(query)}`;
    const resp = await fetch(url, { signal: AbortSignal.timeout(5000) });
    if (!resp.ok) throw new Error('Wiktionary error');
    const data = await resp.json();

    const results = [];

    // Wiktionary returns language-keyed sections
    // Look for Chinese sections: "zh", "cmn" (Mandarin), or "Chinese"
    const langKeys = Object.keys(data);
    const zhKeys = langKeys.filter(k =>
      k === 'zh' || k === 'cmn' || k.toLowerCase().includes('chinese')
    );

    // If no Chinese-specific section, try all sections
    const sectionsToSearch = zhKeys.length > 0
      ? zhKeys.flatMap(k => data[k])
      : langKeys.flatMap(k => data[k]);

    for (const section of sectionsToSearch) {
      if (!section || !section.definitions) continue;
      const partOfSpeech = section.partOfSpeech || '';

      for (const def of section.definitions) {
        const rawDef = def.definition || '';
        const cleanDef = stripHtml(rawDef);
        if (!cleanDef || cleanDef.length < 2) continue;

        // Try to extract pinyin from the definition text
        let pinyin = extractPinyin(rawDef) || extractPinyin(cleanDef);

        // Also check parsedExamples for pinyin hints
        if (!pinyin && def.parsedExamples) {
          for (const ex of def.parsedExamples) {
            pinyin = extractPinyin(ex.example || '');
            if (pinyin) break;
          }
        }

        // Clean the English definition (remove pinyin references, HTML cruft)
        let english = cleanDef
          .replace(/\(pinyin[^)]*\)/gi, '')
          .replace(/Pinyin:\s*\S+/gi, '')
          .trim();

        if (english.length < 2) continue;

        // Prepend part of speech if available
        if (partOfSpeech && !english.toLowerCase().startsWith(partOfSpeech.toLowerCase())) {
          english = `(${partOfSpeech}) ${english}`;
        }

        results.push({
          chinese: query,
          pinyin: pinyin || '',
          english: english,
        });
      }
    }

    // De-duplicate by english meaning
    const seen = new Set();
    const unique = results.filter(r => {
      const key = r.english.toLowerCase().slice(0, 40);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    return unique.length > 0 ? unique.slice(0, 8) : null;
  }

  function extractPinyin(text) {
    // Match common pinyin patterns with tone marks or tone numbers
    const toneMarked = text.match(/([a-züāáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]{1,7})/i);
    // Check it's actually pinyin-like (has vowels with tone marks)
    if (toneMarked) {
      const candidate = toneMarked[1];
      if (/[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜ]/.test(candidate)) {
        return candidate;
      }
    }
    // Match numbered pinyin like "mao1"
    const numbered = text.match(/\b([a-z]{1,6}[1-5])\b/i);
    if (numbered) return numbered[1];
    return null;
  }

  function stripHtml(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    return (tmp.textContent || tmp.innerText || '').trim();
  }

  // ─── Lookup Flow ───

  async function performLookup() {
    const query = inputChinese.value.trim();
    if (!query) {
      showStatus('Please enter a Chinese character or word.', 'warning');
      return;
    }

    // Show loading
    lookupBtn.disabled = true;
    lookupBtn.innerHTML = '<span class="spinner"></span><span>Searching…</span>';
    showStatus('', 'loading');
    resultsSelector.classList.add('hidden');
    fieldsRow.classList.add('hidden');
    addBtnRow.classList.add('hidden');

    try {
      const results = await lookupCharacter(query);

      if (!results || results.length === 0) {
        showStatus(
          `No dictionary entry found for "<span class="font-chinese">${escapeHtml(query)}</span>". You can fill in the fields manually.`,
          'not-found'
        );
        showManualFields('', '');
        return;
      }

      if (results.length === 1) {
        showStatus(`Found: <span class="font-chinese">${escapeHtml(query)}</span>`, 'success');
        showManualFields(results[0].pinyin, results[0].english);
      } else {
        showStatus(`Found ${results.length} definitions for <span class="font-chinese">${escapeHtml(query)}</span> — pick one:`, 'success');
        showResultsSelector(results);
      }
    } catch (err) {
      console.error('Lookup error:', err);
      showStatus('Could not reach the dictionary. Fill in the fields manually.', 'error');
      showManualFields('', '');
    } finally {
      lookupBtn.disabled = false;
      lookupBtn.innerHTML = `
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        Look up
      `;
    }
  }

  function showStatus(message, type) {
    lookupStatus.classList.remove('hidden');

    if (type === 'loading') {
      lookupStatus.innerHTML = `
        <div class="flex items-center gap-2 text-ink-400 text-sm py-1">
          <span class="spinner"></span>
          <span>Searching dictionary…</span>
        </div>`;
      return;
    }

    const styles = {
      success:    { color: 'text-jade-dark',  icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>' },
      warning:    { color: 'text-vermillion', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>' },
      error:      { color: 'text-vermillion', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>' },
      'not-found':{ color: 'text-ink-500',    icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>' },
    };
    const s = styles[type] || styles['not-found'];

    lookupStatus.innerHTML = `
      <div class="flex items-center gap-2 ${s.color} text-sm py-1">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">${s.icon}</svg>
        <span>${message}</span>
      </div>`;
  }

  function showResultsSelector(results) {
    resultsSelector.classList.remove('hidden');
    resultsList.innerHTML = '';

    results.forEach((r, i) => {
      const div = document.createElement('div');
      div.className = 'result-option border border-ink-200 rounded-xl px-4 py-3 flex flex-wrap items-center gap-2 sm:gap-3';
      div.innerHTML = `
        <span class="font-chinese text-lg text-ink-800">${escapeHtml(r.chinese)}</span>
        ${r.pinyin ? `<span class="text-ink-400 text-sm">${escapeHtml(r.pinyin)}</span>` : ''}
        <span class="text-ink-300 hidden sm:inline">—</span>
        <span class="text-ink-600 text-sm flex-1 min-w-0">${escapeHtml(truncate(r.english, 90))}</span>
      `;
      div.addEventListener('click', () => {
        resultsList.querySelectorAll('.result-option').forEach(el => el.classList.remove('selected'));
        div.classList.add('selected');
        showManualFields(r.pinyin, r.english);
      });
      resultsList.appendChild(div);

      // Auto-select first result
      if (i === 0) {
        div.classList.add('selected');
        showManualFields(r.pinyin, r.english);
      }
    });
  }

  function showManualFields(pinyin, english) {
    fieldsRow.classList.remove('hidden');
    addBtnRow.classList.remove('hidden');
    inputPinyin.value = pinyin || '';
    inputEnglish.value = english || '';
    inputPinyin.classList.toggle('field-auto-filled', !!pinyin);
    inputEnglish.classList.toggle('field-auto-filled', !!english);
  }

  function resetForm() {
    inputChinese.value = '';
    inputPinyin.value = '';
    inputEnglish.value = '';
    lookupStatus.classList.add('hidden');
    resultsSelector.classList.add('hidden');
    fieldsRow.classList.add('hidden');
    addBtnRow.classList.add('hidden');
    inputPinyin.classList.remove('field-auto-filled');
    inputEnglish.classList.remove('field-auto-filled');
    inputChinese.focus();
  }

  // ─── Toast ───
  let toastTimer = null;
  function showToast(text, type = 'success') {
    clearTimeout(toastTimer);
    const icons = { success: '✓', delete: '✕', info: '↻' };
    toastIcon.textContent = icons[type] || '✓';
    toastText.textContent = text;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  // ─── Render Cards ───
  function renderCards(animate = false) {
    grid.innerHTML = '';

    if (cards.length === 0) {
      emptyState.classList.remove('hidden');
      cardCount.classList.add('hidden');
      shuffleBtn.classList.add('hidden');
      return;
    }

    emptyState.classList.add('hidden');
    cardCount.classList.remove('hidden');
    cardCount.textContent = cards.length;
    shuffleBtn.classList.remove('hidden');

    cards.forEach((card, index) => {
      grid.appendChild(createCardElement(card, index, animate));
    });
  }

  function createCardElement(card, index, animate) {
    const wrapper = document.createElement('div');
    wrapper.className = 'perspective-container';
    if (animate) {
      wrapper.style.opacity = '0';
      wrapper.style.animationDelay = `${index * 0.06}s`;
      wrapper.classList.add('card-enter');
    }

    wrapper.innerHTML = `
      <div class="flashcard relative h-52 sm:h-56" data-id="${card.id}">
        <div class="flashcard-inner">
          <div class="flashcard-front bg-white border border-ink-200/50 shadow-sm flex flex-col items-center justify-center p-6 select-none">
            <div class="absolute top-3 left-3">
              <div class="w-2 h-2 rounded-full bg-vermillion/30"></div>
            </div>
            <span class="font-chinese text-4xl sm:text-5xl text-ink-800 mb-3 leading-none">${escapeHtml(card.chinese)}</span>
            <span class="text-ink-400 text-sm sm:text-base tracking-wide">${escapeHtml(card.pinyin)}</span>
            <div class="absolute bottom-3 right-3 text-ink-200">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/>
              </svg>
            </div>
          </div>
          <div class="flashcard-back bg-ink-800 border border-ink-700 shadow-sm flex flex-col items-center justify-center p-6 select-none">
            <div class="seal-stamp absolute top-4 right-4"><span>译</span></div>
            <span class="font-display text-2xl sm:text-3xl text-ink-100 italic text-center leading-snug">${escapeHtml(card.english)}</span>
            <div class="mt-3 flex items-center gap-1.5 text-ink-400 text-xs">
              <span class="font-chinese">${escapeHtml(card.chinese)}</span>
              <span>·</span>
              <span>${escapeHtml(card.pinyin)}</span>
            </div>
          </div>
        </div>
        <button
          class="delete-btn absolute top-2 right-2 z-10 w-7 h-7 rounded-full bg-ink-800/60 hover:bg-vermillion text-ink-200 hover:text-white flex items-center justify-center transition-all duration-200 backdrop-blur-sm"
          data-delete-id="${card.id}"
          title="Delete card"
        >
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>`;

    const flashcard = wrapper.querySelector('.flashcard');
    flashcard.addEventListener('click', (e) => {
      if (e.target.closest('.delete-btn')) return;
      flashcard.classList.toggle('flipped');
    });

    wrapper.querySelector('.delete-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const id = e.currentTarget.getAttribute('data-delete-id');
      deleteCard(id);
      wrapper.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      wrapper.style.opacity = '0';
      wrapper.style.transform = 'scale(0.9)';
      setTimeout(() => renderCards(false), 300);
    });

    return wrapper;
  }

  // ─── CRUD ───
  function addCard(chinese, pinyin, english) {
    const card = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      chinese: chinese.trim(),
      pinyin: pinyin.trim(),
      english: english.trim(),
      created: Date.now(),
    };
    cards.unshift(card);
    saveCards(cards);
    renderCards(false);

    const first = grid.firstElementChild;
    if (first) {
      first.style.opacity = '0';
      first.classList.add('card-enter');
    }

    showToast(`"${card.chinese}" added`, 'success');
  }

  function deleteCard(id) {
    const card = cards.find(c => c.id === id);
    cards = cards.filter(c => c.id !== id);
    saveCards(cards);
    if (card) showToast(`"${card.chinese}" removed`, 'delete');
  }

  function shuffleCards() {
    for (let i = cards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    saveCards(cards);
    renderCards(true);
    showToast('Cards shuffled', 'info');
  }

  // ─── Utility ───
  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function truncate(str, len) {
    return str.length > len ? str.slice(0, len) + '…' : str;
  }

  // ─── Events ───

  lookupBtn.addEventListener('click', performLookup);

  inputChinese.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); performLookup(); }
  });

  manualToggle.addEventListener('click', () => {
    inputPinyin.classList.remove('field-auto-filled');
    inputEnglish.classList.remove('field-auto-filled');
    inputPinyin.value = '';
    inputEnglish.value = '';
    resultsSelector.classList.add('hidden');
    showStatus('Fill in the pinyin and English manually.', 'not-found');
    inputPinyin.focus();
  });

  addBtn.addEventListener('click', () => {
    const chinese = inputChinese.value.trim();
    const pinyin  = inputPinyin.value.trim();
    const english = inputEnglish.value.trim();

    if (!chinese) { showToast('Enter a Chinese character', 'warning'); inputChinese.focus(); return; }
    if (!pinyin || !english) {
      showToast('Pinyin and English are required', 'warning');
      (!pinyin ? inputPinyin : inputEnglish).focus();
      return;
    }

    addCard(chinese, pinyin, english);
    resetForm();
  });

  [inputPinyin, inputEnglish].forEach(f => {
    f.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addBtn.click(); }
    });
  });

  inputPinyin.addEventListener('input', () => inputPinyin.classList.remove('field-auto-filled'));
  inputEnglish.addEventListener('input', () => inputEnglish.classList.remove('field-auto-filled'));

  shuffleBtn.addEventListener('click', shuffleCards);

  // ─── Init ───
  renderCards(true);
})();
</script>
</body>
</html>
